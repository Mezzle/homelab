##############################################################################
# Infrastructure stack — Portainer agent
#
# Runs Portainer in agent mode so the primary Portainer instance on pancake
# can manage this server's containers from a single UI.
#
# Required:
#   - Copy .env.example to .env and fill in your values
##############################################################################

x-common-env: &common-env
  TZ: Europe/London

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 15s

x-tailscale-env: &tailscale-env
  TS_AUTHKEY: ${TS_AUTHKEY}
  TS_STATE_DIR: /var/lib/tailscale
  TS_USERSPACE: "false"
  TS_ENABLE_HEALTH_CHECK: "true"

x-tailscale-sidecar: &tailscale-sidecar
  image: tailscale/tailscale:latest
  restart: unless-stopped
  networks:
    - infra
  cap_add:
    - NET_ADMIN
    - NET_RAW
  devices:
    - /dev/net/tun
  deploy:
    resources:
      limits:
        memory: 128M
  read_only: true
  tmpfs:
    - /tmp
    - /run
  healthcheck:
    <<: *healthcheck-defaults
    test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9002/healthz"]
  logging: *default-logging

networks:
  infra:
    driver: bridge

services:
  ##########################################################################
  # Portainer Agent
  #
  # Connect from the primary Portainer UI on pancake:
  #   Environments → Add → Agent
  #   URL: portainer-charm.<tailnet>.ts.net:9001
  ##########################################################################
  portainer-agent:
    image: portainer/agent:alpine
    container_name: portainer-agent
    restart: unless-stopped
    networks:
      - infra
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
    ports:
      - 9001:9001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:9001/ping"]
    logging: *default-logging

  ##########################################################################
  # Tailscale sidecar — exposes agent port over Tailscale
  ##########################################################################
  ts-portainer:
    <<: *tailscale-sidecar
    container_name: ts-portainer-charm
    hostname: ts-portainer-charm
    depends_on:
      portainer-agent:
        condition: service_healthy
    environment:
      <<: *tailscale-env
      TS_HOSTNAME: portainer-charm
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - ./config/tailscale/portainer/state:/var/lib/tailscale:z
      - ./config/tailscale/portainer/serve.json:/config/serve.json:ro,z
