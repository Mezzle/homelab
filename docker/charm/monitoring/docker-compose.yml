##############################################################################
# Monitoring stack — AdGuard Home (backup) + AG Sync
#
# Runs on the Mac Mini. AdGuard acts as a backup DNS instance, synced
# from the primary on the Raspberry Pi.
#
#
# Required:
#   - Copy .env.example to .env and fill in your values
##############################################################################

x-common-env: &common-env
  TZ: Europe/London

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 15s

x-tailscale-env: &tailscale-env
  TS_AUTHKEY: ${TS_AUTHKEY}
  TS_STATE_DIR: /var/lib/tailscale
  TS_USERSPACE: "false"
  TS_ENABLE_HEALTH_CHECK: "true"

x-tailscale-sidecar: &tailscale-sidecar
  image: tailscale/tailscale:latest
  restart: unless-stopped
  networks:
    - monitoring
  cap_add:
    - NET_ADMIN
    - NET_RAW
  devices:
    - /dev/net/tun
  deploy:
    resources:
      limits:
        memory: 128M
  read_only: true
  tmpfs:
    - /tmp
    - /run
  healthcheck:
    <<: *healthcheck-defaults
    test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9002/healthz"]
  logging: *default-logging

networks:
  monitoring:
    driver: bridge
  # Macvlan — gives AdGuard its own LAN IP so it can bind port 53
  # without conflicting with systemd-resolved on the host
  lan:
    driver: macvlan
    driver_opts:
      parent: enp3s0f0
    ipam:
      config:
        - subnet: 192.168.4.0/22
          gateway: 192.168.4.1

services:
  ##########################################################################
  # AdGuard Home — backup DNS instance
  # Kept in sync with the primary on the Raspberry Pi via adguard-sync
  #
  # Runs on macvlan with its own LAN IP so port 53 doesn't conflict
  # with systemd-resolved on the host.
  ##########################################################################
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    hostname: adguard-backup
    restart: unless-stopped
    networks:
      monitoring:
      lan:
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
    volumes:
      - ./appdata/adguard/work:/opt/adguardhome/work:z
      - ./appdata/adguard/conf:/opt/adguardhome/conf:z
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
    logging: *default-logging

  ##########################################################################
  # AdGuard Home Sync — syncs config from Pi (primary) to here (replica)
  ##########################################################################
  adguard-sync:
    image: ghcr.io/bakito/adguardhome-sync:latest
    container_name: adguard-sync
    restart: unless-stopped
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64M
    environment:
      <<: *common-env
      # Primary (Raspberry Pi)
      ORIGIN_URL: ${ADGUARD_PRIMARY_URL}
      ORIGIN_USERNAME: ${ADGUARD_PRIMARY_USER}
      ORIGIN_PASSWORD: ${ADGUARD_PRIMARY_PASS}
      # Replica (this instance)
      REPLICA1_URL: http://adguard:3000
      REPLICA1_USERNAME: ${ADGUARD_REPLICA_USER}
      REPLICA1_PASSWORD: ${ADGUARD_REPLICA_PASS}
      # Sync every 30 minutes
      CRON: "*/30 * * * *"
      RUN_ON_START: "true"
    depends_on:
      adguard:
        condition: service_healthy
    logging: *default-logging

  ##########################################################################
  # Tailscale sidecars
  ##########################################################################
  ts-adguard:
    <<: *tailscale-sidecar
    container_name: ts-adguard
    hostname: ts-adguard
    depends_on:
      adguard:
        condition: service_healthy
    environment:
      <<: *tailscale-env
      TS_HOSTNAME: adguard-backup
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - ./config/tailscale/adguard/state:/var/lib/tailscale:z
      - ./config/tailscale/adguard/serve.json:/config/serve.json:ro,z
