##############################################################################
# Music Assistant — music library management and streaming
#
# Uses host network for DLNA/Chromecast discovery.
#
# Required:
#   - Copy .env.example to .env and fill in your values
##############################################################################

x-common-env: &common-env
  TZ: Europe/London

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 15s

x-tailscale-env: &tailscale-env
  TS_AUTHKEY: ${TS_AUTHKEY}
  TS_STATE_DIR: /var/lib/tailscale
  TS_USERSPACE: "false"
  TS_ENABLE_HEALTH_CHECK: "true"

x-tailscale-sidecar: &tailscale-sidecar
  image: tailscale/tailscale:latest
  restart: unless-stopped
  networks:
    - music
  cap_add:
    - NET_ADMIN
    - NET_RAW
  devices:
    - /dev/net/tun
  deploy:
    resources:
      limits:
        memory: 128M
  read_only: true
  tmpfs:
    - /tmp
    - /run
  healthcheck:
    <<: *healthcheck-defaults
    test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
  logging: *default-logging

networks:
  music:
    driver: bridge

services:
  ##########################################################################
  # Music Assistant
  # Host network needed for DLNA/Chromecast discovery.
  # If you don't use those, switch to bridge + ports.
  ##########################################################################
  music-assistant:
    image: ghcr.io/music-assistant/server:latest
    container_name: music-assistant
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # network_mode: host overrides any networks: key — kept explicit
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *common-env
    volumes:
      - ./appdata:/data
      - /mnt/storage/media/music:/media/music:ro
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8095"]
      start_period: 30s
    logging: *default-logging

  ##########################################################################
  # Tailscale sidecar
  ##########################################################################
  ts-music:
    <<: *tailscale-sidecar
    container_name: ts-music
    hostname: ts-music
    depends_on:
      music-assistant:
        condition: service_healthy
    extra_hosts:
      - "host-gateway:host-gateway"
    environment:
      <<: *tailscale-env
      TS_HOSTNAME: music
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - ./config/tailscale/music-assistant/state:/var/lib/tailscale
      - ./config/tailscale/music-assistant/serve.json:/config/serve.json:ro
