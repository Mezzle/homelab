##############################################################################
# Speedtest Tracker — automated internet speed monitoring
#
# Runs periodic speedtests and graphs the results over time.
# Uses SQLite (no external database needed).
#
# Required:
#   - Copy .env.example to .env and fill in your values
#   - Generate APP_KEY: echo "base64:$(openssl rand -base64 32)"
##############################################################################

x-common-env: &common-env
  TZ: Europe/London

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 15s

x-tailscale-env: &tailscale-env
  TS_AUTHKEY: ${TS_AUTHKEY}
  TS_STATE_DIR: /var/lib/tailscale
  TS_USERSPACE: "true"
  TS_ENABLE_HEALTH_CHECK: "true"

x-tailscale-sidecar: &tailscale-sidecar
  image: tailscale/tailscale:latest
  restart: unless-stopped
  networks:
    - speedtest
  cap_add:
    - NET_ADMIN
    - NET_RAW
  devices:
    - /dev/net/tun
  deploy:
    resources:
      limits:
        memory: 128M
  read_only: true
  tmpfs:
    - /tmp
    - /run
  healthcheck:
    <<: *healthcheck-defaults
    test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9002/healthz"]
  logging: *default-logging

networks:
  speedtest:
    driver: bridge

services:
  ##########################################################################
  # Speedtest Tracker
  ##########################################################################
  speedtest:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest
    restart: unless-stopped
    networks:
      - speedtest
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      <<: *common-env
      PUID: 1000
      PGID: 1000
      APP_KEY: ${APP_KEY}
      SPEEDTEST_SCHEDULE: "12 * * * *"
      DB_CONNECTION: sqlite
    volumes:
      - ./appdata:/config:z
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      start_period: 30s
    logging: *default-logging

  ##########################################################################
  # Tailscale sidecar
  ##########################################################################
  ts-speedtest:
    <<: *tailscale-sidecar
    container_name: ts-speedtest
    hostname: ts-speedtest
    depends_on:
      speedtest:
        condition: service_healthy
    environment:
      <<: *tailscale-env
      TS_HOSTNAME: speedtest
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - ./config/tailscale/speedtest/state:/var/lib/tailscale:z
      - ./config/tailscale/speedtest/serve.json:/config/serve.json:ro,z
