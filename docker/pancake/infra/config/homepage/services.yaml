---
# Service widgets — uses Tailscale hostnames resolved via MagicDNS (100.100.100.100).
# API keys are injected via HOMEPAGE_VAR_* env vars (see .env.example).

- Media:
    - Plex:
        icon: plex.svg
        href: https://plex.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Media server
        widget:
          type: plex
          url: https://plex.{{HOMEPAGE_VAR_TAILNET}}.ts.net
          key: "{{HOMEPAGE_VAR_PLEX_TOKEN}}"
    - Sonarr:
        icon: sonarr.svg
        href: https://sonarr.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: TV shows
        widget:
          type: sonarr
          url: https://sonarr.{{HOMEPAGE_VAR_TAILNET}}.ts.net
          key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
    - Radarr:
        icon: radarr.svg
        href: https://radarr.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Movies
        widget:
          type: radarr
          url: https://radarr.{{HOMEPAGE_VAR_TAILNET}}.ts.net
          key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
    - Prowlarr:
        icon: prowlarr.svg
        href: https://prowlarr.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Indexer manager
        widget:
          type: prowlarr
          url: https://prowlarr.{{HOMEPAGE_VAR_TAILNET}}.ts.net
          key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"

- Photos & Music:
    - Immich:
        icon: immich.svg
        href: https://immich.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Photo management
        widget:
          type: immich
          url: https://immich.{{HOMEPAGE_VAR_TAILNET}}.ts.net
          key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
    - Music Assistant:
        icon: music-assistant.svg
        href: https://music.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Music streaming

- Home:
    - Home Assistant:
        icon: home-assistant.svg
        href: https://ha.67l.uk
        description: Smart home
    - AdGuard Home:
        icon: adguard-home.svg
        href: https://ag.67l.uk
        description: DNS filtering
        widget:
          type: adguard
          url: https://pihole.{{HOMEPAGE_VAR_TAILNET}}.ts.net
          username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
          password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
#    - Zigbee2MQTT:
#        icon: zigbee2mqtt.svg
#        href: https://z2m.{{HOMEPAGE_VAR_TAILNET}}.ts.net
#        description: Zigbee bridge

- Infrastructure:
    - Portainer:
        icon: portainer.svg
        href: https://portainer.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Docker management
        widget:
          type: portainer
          url: https://portainer.{{HOMEPAGE_VAR_TAILNET}}.ts.net
          env: 1
          key: "{{HOMEPAGE_VAR_PORTAINER_API_KEY}}"

- Monitoring:
    - Uptime Kuma:
        icon: uptime-kuma.svg
        href: https://uptime-kuma.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: External monitoring
        widget:
          type: uptimekuma
          url: https://uptime-kuma.{{HOMEPAGE_VAR_TAILNET}}.ts.net
          slug: homelab
