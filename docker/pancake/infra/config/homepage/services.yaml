---
# Service widgets
# href: Tailscale URLs (opened in browser)
# widget url: host-gateway URLs (reached from inside the container)

- Media:
    - Plex:
        icon: plex.svg
        href: https://plex.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Media server
        widget:
          type: plex
          url: http://host.docker.internal:32400
          key: "{{HOMEPAGE_VAR_PLEX_TOKEN}}"
    - Sonarr:
        icon: sonarr.svg
        href: https://sonarr.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: TV shows
        widget:
          type: sonarr
          url: http://host.docker.internal:8989
          key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
    - Radarr:
        icon: radarr.svg
        href: https://radarr.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Movies
        widget:
          type: radarr
          url: http://host.docker.internal:7878
          key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
    - Prowlarr:
        icon: prowlarr.svg
        href: https://prowlarr.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Indexer manager
        widget:
          type: prowlarr
          url: http://host.docker.internal:9696
          key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"

- Photos & Music:
    - Immich:
        icon: immich.svg
        href: https://immich.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Photo management
        widget:
          type: immich
          url: http://host.docker.internal:2283
          key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
    - Music Assistant:
        icon: music-assistant.svg
        href: https://music.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Music streaming

- Home:
    - Home Assistant:
        icon: home-assistant.svg
        href: https://ha.67l.uk
        description: Smart home
    - AdGuard Home:
        icon: adguard-home.svg
        href: https://ag.67l.uk
        description: DNS filtering
        widget:
          type: adguard
          url: https://ag.67l.uk
          username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
          password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
    - Zigbee2MQTT:
        icon: zigbee2mqtt.svg
        href: https://z2m.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Zigbee bridge

- Infrastructure:
    - Dockge:
        icon: dockge.svg
        href: https://dockge.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Docker compose UI

- Monitoring:
    - Uptime Kuma:
        icon: uptime-kuma.svg
        href: https://uptime-kuma.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: External monitoring
        widget:
          type: uptimekuma
          url: https://uptime-kuma.{{HOMEPAGE_VAR_TAILNET}}.ts.net
          slug: homelab
    - Prometheus:
        icon: prometheus.svg
        href: https://prometheus.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Metrics & alerting
        widget:
          type: prometheus
          url: http://host.docker.internal:9090
    - Alertmanager:
        icon: alertmanager.svg
        href: https://alertmanager.{{HOMEPAGE_VAR_TAILNET}}.ts.net
        description: Alert routing (powder)
