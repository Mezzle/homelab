##############################################################################
# Infrastructure stack — Portainer (Docker UI) + Diun (image update notifier)
#
# Portainer manages Docker containers/stacks via a web UI. Remote agents
# on charm and powder are connected over Tailscale.
#
# Diun watches all running containers for image updates and notifies
# via webhook/email/etc.
#
# Required:
#   - Copy .env.example to .env and fill in your values
##############################################################################

x-common-env: &common-env
  TZ: Europe/London

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 15s

x-tailscale-env: &tailscale-env
  TS_AUTHKEY: ${TS_AUTHKEY}
  TS_STATE_DIR: /var/lib/tailscale
  TS_USERSPACE: "true"
  TS_ENABLE_HEALTH_CHECK: "true"

x-tailscale-sidecar: &tailscale-sidecar
  image: tailscale/tailscale:latest
  restart: unless-stopped
  networks:
    - infra
  cap_add:
    - NET_ADMIN
    - NET_RAW
  devices:
    - /dev/net/tun
  deploy:
    resources:
      limits:
        memory: 128M
  read_only: true
  tmpfs:
    - /tmp
    - /run
  healthcheck:
    <<: *healthcheck-defaults
    test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9002/healthz"]
  logging: *default-logging

networks:
  infra:
    driver: bridge

services:
  ##########################################################################
  # Portainer — Docker management UI
  #
  # Connect remote agents from the UI:
  #   Environments → Add → Agent
  #   URL: portainer-charm.<tailnet>.ts.net:9001
  #   URL: portainer-powder.<tailnet>.ts.net:9001
  ##########################################################################
  portainer:
    image: portainer/portainer-ce:alpine
    container_name: portainer
    restart: unless-stopped
    networks:
      - infra
    security_opt:
      - label=disable
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - 9443:9443
    environment:
      <<: *common-env
    volumes:
      - ./appdata/portainer:/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=3", "--spider", "http://127.0.0.1:9000/api/system/status"]
    logging: *default-logging

  ##########################################################################
  # Homepage — dashboard for all homelab services
  #
  # Config files in config/homepage/ are committed to git.
  # API keys and secrets come from HOMEPAGE_VAR_* env vars.
  ##########################################################################
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    networks:
      - infra
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 100.100.100.100
    ports:
      - 3000:3000
    environment:
      <<: *common-env
      # Homepage reads HOMEPAGE_VAR_* from the environment automatically
      HOMEPAGE_VAR_TAILNET: ${TAILNET}
      HOMEPAGE_VAR_SONARR_API_KEY: ${SONARR_API_KEY:-}
      HOMEPAGE_VAR_RADARR_API_KEY: ${RADARR_API_KEY:-}
      HOMEPAGE_VAR_PROWLARR_API_KEY: ${PROWLARR_API_KEY:-}
      HOMEPAGE_VAR_PLEX_TOKEN: ${PLEX_TOKEN:-}
      HOMEPAGE_VAR_IMMICH_API_KEY: ${IMMICH_API_KEY:-}
      HOMEPAGE_VAR_ADGUARD_USER: ${ADGUARD_USER:-admin}
      HOMEPAGE_VAR_ADGUARD_PASS: ${ADGUARD_PASS:-}
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS:-localhost,homepage.${TAILNET}.ts.net}
      HOMEPAGE_VAR_PORTAINER_API_KEY: ${PORTAINER_API_KEY:-}
    volumes:
      - ./config/homepage:/app/config:z
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
    logging: *default-logging

  ##########################################################################
  # Diun — Docker Image Update Notifier
  #
  # Configure notifications in config/diun/diun.yml after first boot.
  # Supports: Discord, Slack, email, Gotify, ntfy, webhooks, etc.
  ##########################################################################
  diun:
    image: crazymax/diun:latest
    container_name: diun
    restart: unless-stopped
    networks:
      - infra
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      <<: *common-env
      DIUN_WATCH_SCHEDULE: "0 6 * * *"
      DIUN_WATCH_JITTER: 30s
      DIUN_PROVIDERS_DOCKER: "true"
      DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT: "true"
    volumes:
      - ./appdata/diun:/data:z
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "diun", "--version"]
    logging: *default-logging

  ##########################################################################
  # Tailscale sidecars
  ##########################################################################
  ts-homepage:
    <<: *tailscale-sidecar
    container_name: ts-homepage
    hostname: ts-homepage
    depends_on:
      homepage:
        condition: service_healthy
    environment:
      <<: *tailscale-env
      TS_HOSTNAME: homepage
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - ./config/tailscale/homepage/state:/var/lib/tailscale:z
      - ./config/tailscale/homepage/serve.json:/config/serve.json:ro,z

  ts-portainer:
    <<: *tailscale-sidecar
    container_name: ts-portainer
    hostname: ts-portainer
    depends_on:
      portainer:
        condition: service_healthy
    environment:
      <<: *tailscale-env
      TS_HOSTNAME: portainer
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - ./config/tailscale/portainer/state:/var/lib/tailscale:z
      - ./config/tailscale/portainer/serve.json:/config/serve.json:ro,z
