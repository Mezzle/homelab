###############################################################################
# Alert rules — critical-only, no noise
#
# Philosophy: only fire when human action is needed.
# If it can self-heal, it shouldn't page you.
###############################################################################
groups:
  ##########################################################################
  # Disk — the most common homelab failure mode
  ##########################################################################
  - name: disk
    rules:
      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint=~"/(mnt/storage)?"} / node_filesystem_size_bytes) * 100 < 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk almost full on {{ $labels.instance }}"
          description: "{{ $labels.mountpoint }} has only {{ printf \"%.1f\" $value }}% free space. Clean up or expand storage NOW."

      - alert: DiskSpaceWarning
        expr: (node_filesystem_avail_bytes{mountpoint=~"/(mnt/storage)?"} / node_filesystem_size_bytes) * 100 < 15
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low on {{ $labels.instance }}"
          description: "{{ $labels.mountpoint }} has {{ printf \"%.1f\" $value }}% free. Plan cleanup soon."

      - alert: DiskReadOnly
        expr: node_filesystem_readonly{mountpoint=~"/(mnt/storage)?"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Filesystem read-only on {{ $labels.instance }}"
          description: "{{ $labels.mountpoint }} has gone read-only. Possible disk failure or corruption. Check dmesg immediately."

  ##########################################################################
  # Memory — OOM kills are the second most common issue
  ##########################################################################
  - name: memory
    rules:
      - alert: HostMemoryCritical
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host memory critical on {{ $labels.instance }}"
          description: "Only {{ printf \"%.1f\" $value }}% memory available. OOM kills imminent."

      - alert: HostMemoryWarning
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 10
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Host memory low on {{ $labels.instance }}"
          description: "{{ printf \"%.1f\" $value }}% memory available for 30+ minutes."

  ##########################################################################
  # Containers — crash loops and restarts
  ##########################################################################
  - name: containers
    rules:
      - alert: ContainerCrashLoop
        expr: increase(container_restart_count[30m]) > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Container crash-looping: {{ $labels.name }}"
          description: "{{ $labels.name }} has restarted {{ printf \"%.0f\" $value }} times in 30 minutes. Check logs: docker logs {{ $labels.name }}"

      - alert: ContainerOOMKilled
        expr: container_oom_events_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Container OOM killed: {{ $labels.name }}"
          description: "{{ $labels.name }} was killed by the OOM killer. Increase its memory limit or investigate the leak."

  ##########################################################################
  # Backups — silent failure is the worst kind
  ##########################################################################
  - name: backups
    rules:
      - alert: BackupStale
        expr: (time() - node_filesystem_file_modify_time_seconds{mountpoint="/mnt/storage"}) > 172800
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Backup may be stale on {{ $labels.instance }}"
          description: "No file modifications on backup storage for 48+ hours. Verify the backup cron is running."

  ##########################################################################
  # Node health — is the machine even up?
  ##########################################################################
  - name: node-health
    rules:
      - alert: NodeDown
        expr: up{job="node-exporter"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Node unreachable: {{ $labels.instance }}"
          description: "{{ $labels.instance }} has been unreachable for 3+ minutes. Check if the machine is powered on and network is up."

      - alert: HighLoadAverage
        expr: node_load15 > on(instance) count by(instance) (node_cpu_seconds_total{mode="idle"}) * 2
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High load average on {{ $labels.instance }}"
          description: "15-minute load average is {{ printf \"%.1f\" $value }}, more than double the CPU count. Something is thrashing."
