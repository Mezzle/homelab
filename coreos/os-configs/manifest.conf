###############################################################################
# OS config manifest — maps repo files to system paths
#
# Format: <source> <destination> <mode> [reload-action]
#
# Source paths are relative to coreos/os-configs/
# Lines starting with # are comments. Blank lines are ignored.
#
# Reload actions (optional):
#   sysctl    — sudo sysctl --system
#   docker    — sudo systemctl reload docker
#   sshd      — sudo systemctl reload sshd
#
# Per-server files live in <hostname>/ subdirectories.
# Shared files live in the root os-configs/ directory.
###############################################################################

# Shared configs (applied to all FCOS servers)
sysctl-90-arr-tuning.conf       /etc/sysctl.d/90-arr-tuning.conf        0644  sysctl
docker-daemon.json               /etc/docker/daemon.json                  0644  docker
sshd-50-hardening.conf           /etc/ssh/sshd_config.d/50-hardening.conf 0600  sshd

# Per-server configs (applied only to the matching hostname)
pancake/motd.sh                  /etc/profile.d/motd.sh                   0755
powder/motd.sh                   /etc/profile.d/motd.sh                   0755
